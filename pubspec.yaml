name: palcareer
description: "PalCareer — وظائف فلسطين"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.6.1

  # Navigation
  go_router: ^15.1.2

  # Firebase
  firebase_core: ^3.15.2
  firebase_auth: ^5.7.0
  cloud_firestore: ^5.6.12
  firebase_messaging: ^15.2.6

  # Local Storage
  hive_flutter: ^1.1.0

  # Auth
  google_sign_in: ^7.2.0

  # Utilities
  url_launcher: ^6.3.1
  package_info_plus: ^8.3.0
  cached_network_image: ^3.4.1
  intl: any
  google_fonts: ^6.2.1
  share_plus: ^12.0.2
  shimmer: ^3.0.0
  easy_localization: ^3.0.8
  firebase_remote_config: ^5.5.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/i18n/
    - assets/config/
